{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — keyforge</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f5f7; margin: 0; padding: 0; color: #1d1d1f; }
    .container { max-width: 420px; margin: 64px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.05); }
    h1 { font-size: 22px; margin: 0 0 16px; }
    .muted { color: #6e6e73; font-size: 14px; }
    .scope-list { margin: 16px 0; padding: 0; list-style: none; }
    .scope-list li { padding: 8px 0; border-bottom: 1px solid #eee; }
    .scope-list li:last-child { border-bottom: none; }
    label { display: block; margin: 12px 0 4px; font-weight: 500; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 16px;
      border: 1px solid #d2d2d7; border-radius: 8px;
    }
    button { width: 100%; padding: 11px; font-size: 16px; font-weight: 500;
      background: #0071e3; color: #fff; border: 0; border-radius: 8px; cursor: pointer; margin-top: 16px; }
    button.secondary { background: #e5e5ea; color: #1d1d1f; }
    .error { background: #ffeaea; color: #c00; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .actions { display: flex; gap: 12px; }
    .actions button { flex: 1; }
    .branding { text-align: center; margin-bottom: 24px; font-weight: 600; color: #6e6e73; }
  </style>
</head>
<body>
  <div class="container">
    <div class="branding">{{.Tenant.DisplayName}}</div>
    {{block "body" .}}{{end}}
  </div>
</body>
</html>
{{end}}
