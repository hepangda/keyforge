name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/keyforge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/keyforge:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/keyforge@${{ steps.build.outputs.digest }}

      - name: SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          image:  ghcr.io/${{ github.repository_owner }}/keyforge@${{ steps.build.outputs.digest }}
          output-file: sbom.cdx.json
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cdx.json

      - name: Push Helm chart (OCI)
        uses: azure/setup-helm@v4
        with: { version: v3.16.2 }
      - name: Package + push chart
        run: |
          helm package deploy/helm/keyforge --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
          helm push keyforge-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
