apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keyforge.fullname" . }}
  labels: {{- include "keyforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "keyforge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "keyforge.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: keyforge
          image: {{ include "keyforge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - { name: public, containerPort: 8080 }
            - { name: admin,  containerPort: 9090 }
            - { name: mtls,   containerPort: 8443 }
          env:
            - name: KEYFORGE_SERVER__ADDR
              value: ":8080"
            - name: KEYFORGE_SERVER__ADMIN_ADDR
              value: ":9090"
            - name: KEYFORGE_OIDC__ISSUER
              value: {{ .Values.config.issuer | quote }}
            - name: KEYFORGE_LOGGING__LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: KEYFORGE_LOGGING__FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: KEYFORGE_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "keyforge.fullname" . }}-db
                  key: url
            - name: KEYFORGE_JWKS__MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.jwks.masterKeySecret.name }}
                  key:  {{ .Values.config.jwks.masterKeySecret.key }}
          readinessProbe:
            httpGet: { path: /readyz, port: public }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: public }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
