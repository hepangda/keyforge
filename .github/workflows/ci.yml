name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: true }
      - name: gofumpt
        run: |
          go run mvdan.cc/gofumpt@latest -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with: { version: latest, args: --timeout 5m }

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: true }
      - run: go vet ./...
      - run: go test -race -count=1 -timeout 5m ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: true }
      - name: go test -tags=integration
        run: go test -tags=integration -timeout 20m -count=1 ./...

  e2e-playwright:
    name: SPA e2e (Playwright)
    runs-on: ubuntu-latest
    if: false  # enable once a real Playwright suite lands
    steps:
      - uses: actions/checkout@v4

  e2e-shell:
    name: Shell e2e (curl/jq)
    runs-on: ubuntu-latest
    if: false  # enable once scripts/e2e/*.sh lands
    steps:
      - uses: actions/checkout@v4

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: true }
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/keyforge:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  trivy-scan:
    name: Trivy
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity:  HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  sbom-generate:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom-${{ github.sha }}, path: sbom.cdx.json }

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.16.2 }
      - run: helm lint deploy/helm/keyforge
      - name: helm template render
        run: helm template kf deploy/helm/keyforge --debug > /tmp/render.yaml
