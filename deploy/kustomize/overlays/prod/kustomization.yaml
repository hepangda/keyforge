apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keyforge-prod
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: keyforge }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
