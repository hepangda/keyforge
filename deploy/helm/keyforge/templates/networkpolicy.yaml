{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "keyforge.fullname" . }}
  labels: {{- include "keyforge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "keyforge.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    {{- with .Values.networkPolicy.postgresCidr }}
    - to: [{ ipBlock: { cidr: {{ . }} } }]
      ports: [{ port: 5432, protocol: TCP }]
    {{- end }}
    {{- with .Values.networkPolicy.smtpCidr }}
    - to: [{ ipBlock: { cidr: {{ . }} } }]
      ports: [{ port: 587, protocol: TCP }]
    {{- end }}
    {{- with .Values.networkPolicy.otlpCidr }}
    - to: [{ ipBlock: { cidr: {{ . }} } }]
      ports: [{ port: 4317, protocol: TCP }]
    {{- end }}
{{- end }}
