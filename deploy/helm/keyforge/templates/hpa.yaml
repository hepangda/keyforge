{{- if .Values.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "keyforge.fullname" . }}
  labels: {{- include "keyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "keyforge.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }} }
    {{- if .Values.autoscaling.targetTokenRate }}
    - type: Pods
      pods:
        metric: { name: keyforge_token_issued_total }
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.targetTokenRate | quote }}
    {{- end }}
{{- end }}
