repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: bash -c 'go run mvdan.cc/gofumpt@latest -l -d .'
        language: system
        types: [go]
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run --new-from-rev=HEAD~1'
        language: system
        types: [go]
        pass_filenames: false
      - id: govulncheck
        name: govulncheck
        entry: bash -c 'go run golang.org/x/vuln/cmd/govulncheck@latest ./...'
        language: system
        types: [go]
        pass_filenames: false
