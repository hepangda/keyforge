apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyforge
  namespace: keyforge
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: keyforge }
  template:
    metadata:
      labels: { app.kubernetes.io/name: keyforge }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: keyforge
          image: keyforge:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          ports:
            - { name: public, containerPort: 8080 }
            - { name: admin,  containerPort: 9090 }
          readinessProbe:
            httpGet: { path: /readyz, port: public }
          livenessProbe:
            httpGet: { path: /healthz, port: public }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1,    memory: 512Mi }
