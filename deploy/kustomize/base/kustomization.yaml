# Base kustomize manifests for keyforge — kept minimal so overlays can
# stack patches without fighting structural conflicts. Production
# clusters should prefer the Helm chart (deploy/helm/keyforge); this
# tree exists for teams that want plain kubectl apply -k.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: keyforge
  app.kubernetes.io/part-of: keyforge

images:
  - name: keyforge
    newName: ghcr.io/hepangda/keyforge
    newTag: latest
